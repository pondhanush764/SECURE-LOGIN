<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Secure Portal{% endblock %}</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1f2937;
            --error: #ef4444;
            --success: #22c55e;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 { margin-top: 0; margin-bottom: 1.5rem; font-size: 1.75rem; font-weight: 700; text-align: center; }
        
        .form-group { margin-bottom: 1.25rem; }
        
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; }
        
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.15s ease;
        }
        input:focus { outline: none; border-color: var(--primary); }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        button:hover { background-color: var(--primary-hover); }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        .alert-danger { background-color: #fee2e2; color: var(--error); border: 1px solid #fca5a5; }
        .alert-success { background-color: #dcfce7; color: var(--success); border: 1px solid #86efac; }

        .switch-prompt { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: #4b5563; }
        .switch-prompt a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .switch-prompt a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
